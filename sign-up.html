<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng kí</title>
    <link rel="stylesheet" href="./css/login.css">
</head>

<body>

    <div class="container">
        <div class="left-side">
        </div>
        <div class="right-side">

            <div class="login-box">

                <h2 class="login-title">Đăng ký</h2>

                <p class="login-subtitle">
                    Tạo tài khoản chỉ trong vài giây.
                </p>

                <form id="signup-form">

                    <div class="input-group">
                        <label>Tên người dùng</label>
                        <input type="text" id="signup-name" placeholder="Nhập tên của bạn" required>
                    </div>

                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" id="signup-email" placeholder="Nhập email của bạn" required>
                    </div>

                    <div class="input-group">
                        <label>Mật khẩu</label>
                        <input type="password" id="signup-password" placeholder="Nhập mật khẩu của bạn" required>
                    </div>

                    <div class="input-group">
                        <label>Xác nhận mật khẩu</label>
                        <input type="password" id="signup-confirm-password" placeholder="Nhập lại mật khẩu của bạn" required>
                    </div>

                    <button type="submit" class="btn-submit">
                        Đăng ký
                    </button>

                </form>

                <div class="ngan-cach">
                    <span>Hoặc tiếp tục với</span>
                </div>

                <div class="social-login">

                    <button class="btn-google">
                        <img src="./img/Google__G__logo.svg.webp">
                        Google
                    </button>

                    <button class="btn-zalo">
                        <img src="./img/facebook-icon.png">
                        Facebook
                    </button>

                </div>

                <p class="switch-page">
                    Đã có tài khoản?
                    <a href="login.html">Đăng nhập ngay</a>
                </p>

                <footer class="form-footer">
                    © 2026 <a href="./index.html">iZone.vn</a>
                </footer>

            </div>

        </div>

    </div>

    <script src="./js/sign-up.js"></script>

</body>

</html>
