<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng kí</title>
    <link rel="stylesheet" href="./css/login.css">
</head>

<body>
    <div class="container">

        <div class="left-side">
        </div>


        <div class="right-side">
            <div class="login-box">
                <h2 class="login-title">Đăng kí</h2>

                <form id="log">
                    <div class="input-group">
                        <label for="log-name">Tên người dùng</label>
                        <input type="text" id="log-name" placeholder="Nhập tên của bạn" required>
                    </div>

                    <div class="input-group">
                        <label for="log-name">Email</label>
                        <input type="email" id="log-name" placeholder="Nhập email của bạn" required>
                    </div>

                    <div class="input-group">
                        <label for="log-password">Mật khẩu</label>
                        <input type="password" id="log-password" placeholder="Nhập mật khẩu của bạn" required>
                    </div>

                    <button type="submit" class="btn-submit">Đăng kí</button>
                </form>

                <div class="ngan-cach">
                    <span>Hoặc đăng kí bằng</span>
                </div>

                <div class="social-login">
                    <button class="btn-google">
                        <img src="./img/Google__G__logo.svg.webp" alt="">
                         Google
                         <a href="google.com"></a>
                        </button>
                    <button class="btn-zalo">
                        <img src="./img/facebook-icon.png" alt="">
                        Facebook
                        <a href="facebook.com"></a>
                    </button>
                </div>

                <p class="switch-page">Bạn đã có tài khoản?<a href="login.html">Đăng nhập ngay</a></p>

                <footer class="form-footer">
                    Mua sắm tại <a href="home.html">iPhoneStore.vn</a>
                </footer>
            </div>
        </div>

    </div>
</body>

</html>
