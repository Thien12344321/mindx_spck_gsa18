<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sản phẩm iPhone | iZone</title> 
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/product.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/index.html"> iZone</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarContent">
                <form class="d-flex mx-auto" style="width: 400px;">
                    <input class="form-control" type="search" placeholder="Tìm kiếm iPhone...">
                </form>
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item me-3">
                        <a class="nav-link" href="cart.html">Giỏ hàng</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">Tài khoản</a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="/login.html">Đăng nhập</a></li>
                            <li><a class="dropdown-item" href="/sign-up.html">Đăng ký</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="product-detail-container">
        <div class="detail-left">
            <div class="main-image-box">
                <img id="main-product-img" src="" alt="Ảnh sản phẩm">
            </div>

            <div class="thumbnail-slider-container">
                <button type="button" class="slider-btn btn-prev" id="slide-left-btn">❮</button>
                
                <div class="thumbnail-track">
                    <div id="thumbnail-list" class="thumbnail-list">
                        </div>
                </div>
                
                <button type="button" class="slider-btn btn-next" id="slide-right-btn">❯</button>
            </div>
        </div>

        <div class="detail-right">
            <h1 id="product-title" class="product-title">Đang tải tên sản phẩm...</h1>

            <div class="product-rating">
                <span class="stars">⭐⭐⭐⭐⭐</span>
                <span class="rating-text">(5 đánh giá)</span>
            </div>

            <div class="product-price-box">
                <span id="current-price" class="current-price">0đ</span>
                <span id="old-price" class="old-price">0đ</span>
            </div>

            <div class="option-section">
                <p class="option-title">Chọn phiên bản dung lượng:</p>
                <div id="storage-group" class="option-group">
                    </div>
            </div>

            <div class="option-section">
                <p class="option-title">Chọn màu sắc:</p>
                <div id="color-grid" class="color-grid">
                    </div>
            </div>

            <div class="action-buttons">
                <button class="btn-buy-now" onclick="alert('Đã bấm Mua ngay!')">MUA NGAY</button>
                <button class="btn-add-cart" onclick="alert('Đã thêm vào giỏ hàng!')">Thêm vào giỏ</button>
            </div>
        </div>
    </div>

    <div class="product-bottom-info-container container my-5">
        <div class="row g-4">
            <div class="col-lg-8">
                <div id="product-description-section" class="bg-white p-4 rounded-4 shadow-sm">
                    </div>
            </div>
            
            <div class="col-lg-4">
                <div id="product-specifications-section" class="bg-white p-4 rounded-4 shadow-sm">
                    </div>
            </div>
        </div>
    </div>

    <script src="/js/product-detail.js"></script>
</body>
</html>
