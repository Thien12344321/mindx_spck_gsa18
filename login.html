<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <link rel="stylesheet" href="./css/login.css">
</head>

<body>

    <div class="container">

        <div class="left-side">
        </div>

        <div class="right-side">

            <div class="login-box">

                <div class="logo"></div>

                <h2 class="login-title">Đăng nhập</h2>

                <p class="login-subtitle">
                    Chào mừng bạn quay trở lại iZone!
                </p>

                <form id="login-form">

                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" id="log-email" placeholder="Nhập email của bạn" required>
                    </div>

                    <div class="input-group">
                        <label>Mật khẩu</label>
                        <input type="password" id="log-password" placeholder="Nhập mật khẩu của bạn" required>
                    </div>

                    <div class="forgot-pass">
                        <a href="#">Quên mật khẩu?</a>
                    </div>

                    <button type="submit" class="btn-submit">
                        Đăng nhập
                    </button>

                </form>

                <div class="ngan-cach">
                    <span>Hoặc tiếp tục với</span>
                </div>

                <div class="social-login">

                    <button class="btn-google">
                        <img src="./img/Google__G__logo.svg.webp">
                        Google
                    </button>

                    <button class="btn-zalo">
                        <img src="./img/facebook-icon.png">
                        Facebook
                    </button>

                </div>

                <p class="switch-page">
                    Bạn chưa có tài khoản?
                    <a href="sign-up.html">Đăng ký ngay</a>
                </p>

                <footer class="form-footer">
                    © 2026 <a href="./index.html">iZone.vn</a>
                </footer>

            </div>

        </div>

    </div>

    <script src="./js/login.js"></script>
</body>

</html>
